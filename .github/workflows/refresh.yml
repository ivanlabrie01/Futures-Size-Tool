name: refresh-seed

# Re-pull market data and commit data.js. Runs on weekdays after the US close,
# and can be triggered by hand from the Actions tab.
on:
  schedule:
    - cron: "30 22 * * 1-5"   # 22:30 UTC, Mon–Fri
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-seed
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Refresh seed data
        run: python tools/refresh_seed.py
      - name: Commit if changed
        run: |
          git config user.name "seed-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js
          if git diff --staged --quiet; then
            echo "no market changes"
          else
            git commit -m "chore: refresh seed data [skip ci]"
            git push
          fi
